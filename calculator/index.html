<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator UI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="calculator-app">
    <section class="calculator-card">
      <div class="calculator-header">
        <h1>Calculator</h1>
        <p>HTML + CSS design</p>
      </div>

      <div class="display-panel">
        <div class="memory-label">M</div>
        <div class="display-value">0</div>
      </div>

      <div class="button-grid">
        <button class="button light">MC</button>
        <button class="button light">MR</button>
        <button class="button light">M+</button>
        <button class="button light">M-</button>

        <button class="button dark">7</button>
        <button class="button dark">8</button>
        <button class="button dark">9</button>
        <button class="button accent">÷</button>

        <button class="button dark">4</button>
        <button class="button dark">5</button>
        <button class="button dark">6</button>
        <button class="button accent">×</button>

        <button class="button dark">1</button>
        <button class="button dark">2</button>
        <button class="button dark">3</button>
        <button class="button accent">-</button>

        <button class="button dark">0</button>
        <button class="button dark">.</button>
        <button class="button accent">=</button>
        <button class="button accent">+</button>
      </div>
    </section>
  </main>

  <script>
    const buttons = document.querySelectorAll('button'),
          displayValue = document.querySelector('.display-value'),
          memoryLabel = document.querySelector('.memory-label');
    let memory = 0;

    buttons.forEach(button=>{
      button.addEventListener('click', () =>{
        let btnContent = button.textContent;

        if(btnContent === 'MC'){
          memory = 0;
          memoryLabel.style.visibility = 'hidden';
          clearResult();
        }else if(btnContent === "="){
          calculateResult();
        }else if(btnContent === 'MR'){
          displayValue.textContent = memory;
          memoryLabel.style.visibility = memory !== 0 ? 'visible' : 'hidden';
        }else if(btnContent === "M+"){
          let value = Number(
          displayValue.textContent
            .replace(/×/g, '*')
            .replace(/÷/g, '/')
        );

        memory += value;
        memoryLabel.style.visibility = 'visible';
        }else if(btnContent === "M-"){
                  let value = Number(
          displayValue.textContent
            .replace(/×/g, '*')
            .replace(/÷/g, '/')
        );
          memory -= value;
          memoryLabel.style.visibility = memory === 0 ? 'hidden' : 'visible';
        }else{
          appendContent(btnContent);
        }


        
      })
    })


    function clearResult() {
      displayValue.textContent = 0;
    }

    function calculateResult() {
      try {
        let fixed = displayValue.textContent
          .replace(/×/g, '*')
          .replace(/÷/g, '/');

        displayValue.textContent = eval(fixed);

      } catch (error) {
        alert("Sorry, something went wrong");
      }
    }

    function appendContent(btnContent){

      let operators = ['+', '-', '×', '÷'];
      let lastChar = displayValue.textContent.slice(-1);

      if(operators.includes(btnContent) && operators.includes(lastChar)){
        displayValue.textContent = displayValue.textContent.slice(0, -1) + btnContent;
        return;
      }

      if(displayValue.textContent === '0' || displayValue.textContent === 0){
        displayValue.textContent = btnContent;
      }else{
        displayValue.textContent += btnContent
      }
    }

    console.log(buttons)
  </script>
</body>
</html>
