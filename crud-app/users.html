<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - CRUD App UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <input class="nav-toggle" type="checkbox" id="nav-toggle" aria-label="Toggle sidebar">
        <label class="hamburger" for="nav-toggle" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
        </label>
        <label class="nav-scrim" for="nav-toggle" aria-label="Close sidebar"></label>

        <aside class="sidebar">
            <a class="brand" href="index.html">
                <span class="brand-mark">C</span>
                <span>CRUD App</span>
            </a>

            <nav class="side-nav" aria-label="Main navigation">
                <a href="index.html">Dashboard</a>
                <a class="active" href="users.html">Users</a>
                <a href="reports.html">Reports</a>
                <a href="settings.html">Settings</a>
            </nav>

            
        </aside>

        <main class="app-shell">
            <header class="page-header">
                <div>
                    <p class="eyebrow">People</p>
                    <h1>Users</h1>
                    <p class="hero-text">Keep names, roles, and account status easy to scan before you connect your JavaScript logic.</p>
                </div>
                <a class="primary-action add-user">Add User</a>
            </header>

            <section class="profile-grid" aria-label="User profiles">
                <!-- display data -->
            </section>

            <section class="table-panel" aria-labelledby="directory-title">
                <div class="table-header">

                    <div class="section-heading">
                        <p class="eyebrow">Directory</p>
                        <h2 id="directory-title">User list</h2>
                    </div>

                    <div class="table-tools">
                        <input type="search" placeholder="Search by name">
                        <select id="filter-role">
                            <option value="">All Roles</option>
                            <option value="student">Student</option>
                            <option value="teacher">Teacher</option>
                        </select>
                        <select id="filter-status">
                            <option value="">All Status</option>
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>

                </div>

                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody class="renderData">
                            <!-- display data -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div class="modal" id="add-user-modal" role="dialog" aria-labelledby="modal-title" aria-modal="true">
        <a class="modal-backdrop" href="#" aria-label="Close modal"></a>
        <form class="modal-card">
            <div class="modal-header">
                <div>
                    <p class="eyebrow">Create</p>
                    <h2 id="modal-title">Add new user</h2>
                </div>
                <a class="close-button" href="#" aria-label="Close modal">x</a>
            </div>

            <label for="first-name">First name</label>
            <input type="text" id="first-name" name="first_name" placeholder="Enter first name">

            <label for="last-name">Last name</label>
            <input type="text" id="last-name" name="last_name" placeholder="Enter last name">

            <label for="email">Email address</label>
            <input type="email" id="email" name="email" placeholder="name@example.com">

            <label for="status">Role</label>
            <select id="role" name="Role">
                <option value="student">Student</option>
                <option value="teacher">Teacher</option>
                <option value="human">Human</option>
            </select>

            <label for="status">Status</label>
            <select id="status" name="status">
                <option value="active">Active</option>
                <option value="pending">Pending</option>
                <option value="inactive">Inactive</option>
            </select>

            <div class="modal-actions">
                <a class="cancel-button" href="#">Cancel</a>
                <button class="submit-button" type="submit">Save User</button>
            </div>
        </form>
    </div>
    <script type="module" src="js/script.js"></script>
</body>
</html>
