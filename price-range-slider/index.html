<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Range Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main">
    <div class="container">
        <h2>Price Range Slider</h2>

        <div class="input">
            <div class="field">
                <label>Min Price:</label>
                <input type="number" id="min" value="0">
            </div>
            <div class="field">
                <label>Max Price:</label>
                <input type="number" id="max" value="1000">
            </div>
        </div>

        <div class="range-input">
            <input type="range" class="min-range" min="0" max="1000" value="0">
            <input type="range" class="max-range" min="0" max="1000" value="1000">
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
