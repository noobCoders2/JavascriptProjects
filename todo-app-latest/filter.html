<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filter - Todo App UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="single-screen">
    <section class="phone">
      <header class="top-nav">
        <a href="index.html">Cancel</a>
        <h2>Filter</h2>
        <a href="#">Reset</a>
      </header>

      <section class="filter-group">
        <h2>Status</h2>
        <label><span class="radio selected"></span>All <b>✓</b></label>
        <label><span class="radio blue-ring"></span>To Do <i></i></label>
        <label><span class="radio red-ring"></span>In Progress <i></i></label>
        <label><span class="radio green-ring"></span>Completed <i></i></label>
      </section>
      <section class="filter-group">
        <h2>Category</h2>
        <label><span class="radio selected"></span>All <b>✓</b></label>
        <label><span class="radio blue-ring"></span>Work <i></i></label>
        <label><span class="radio orange-ring"></span>Personal <i></i></label>
        <label><span class="radio green-ring"></span>Travel <i></i></label>
        <label><span class="radio gray-ring"></span>Others <i></i></label>
      </section>
      <section class="filter-group">
        <h2>Priority</h2>
        <label><span class="radio selected"></span>All <b>✓</b></label>
        <label><span class="radio red-ring"></span>High <i></i></label>
        <label><span class="radio orange-ring"></span>Medium <i></i></label>
        <label><span class="radio green-ring"></span>Low <i></i></label>
      </section>
      <a class="apply-button" href="index.html">Apply Filter</a>
    </section>
  </main>
</body>
</html>
