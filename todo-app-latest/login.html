<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Todo App UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="single-screen auth-screen">
    <section class="phone auth-page">
      <header class="top-nav">
        <a class="back" href="index.html">&lt;</a>
        <h2>Login</h2>
        <a href="signup.html">Sign up</a>
      </header>

      <section class="auth-card">
        <div class="auth-heading">
          <span class="brand-mark">T</span>
          <h1>Welcome back</h1>
          <p>Login to continue managing your tasks.</p>
        </div>

        <form class="auth-form">
          <label>
            <span>Email address</span>
            <input type="email" placeholder="alex@example.com">
          </label>
          <label>
            <span>Password</span>
            <input type="password" placeholder="Enter your password">
          </label>
          <div class="auth-row">
            <label class="remember"><input type="checkbox"> Remember me</label>
            <a href="#">Forgot password?</a>
          </div>
          <a class="primary-button loginBtn" href="">Login</a>
        </form>

        <p class="auth-switch">New here? <a href="signup.html">Create an account</a></p>
      </section>
    </section>
  </main>
  <script src="./js/athenticationLogin.js"></script>
</body>
</html>
