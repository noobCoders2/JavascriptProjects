<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Todo App UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="single-screen">
    <section class="phone profile-page">
      <header class="top-nav">
        <a class="back" href="index.html">‹</a>
        <h2>Profile</h2>
        <a href="login.html">Logout</a>
      </header>

      <section class="profile-hero">
        <div class="avatar avatar-face large-avatar">A</div>
        <h1>Alex Morgan</h1>
        <p>alex@example.com</p>
      </section>

      <section class="profile-stats">
        <article><strong>8</strong><span>Total</span></article>
        <article><strong>5</strong><span>Done</span></article>
        <article><strong>75%</strong><span>Productive</span></article>
      </section>

      <section class="list-panel profile-list">
        <article><b>Name</b><em>Alex Morgan</em></article>
        <article><b>Email</b><em>alex@example.com</em></article>
        <article><b>Phone</b><em>+1 555 0134</em></article>
        <article><b>Location</b><em>Manila, Philippines</em></article>
      </section>

      <section class="list-panel profile-list">
        <article><b>Daily Goal</b><em>5 tasks</em></article>
        <article><b>Default Category</b><em>Work</em></article>
        <article><b>Theme</b><em>Light</em></article>
      </section>

      <nav class="tab-bar">
        <a href="index.html"><i class="nav-icon tasks"></i><span>Tasks</span></a>
        <a href="calendar.html"><i class="nav-icon calendar-icon"></i><span>Calendar</span></a>
        <a href="stats.html"><i class="nav-icon stats-icon"></i><span>Stats</span></a>
        <a class="active" href="categories.html"><i class="nav-icon settings-icon"></i><span>Settings</span></a>
      </nav>
    </section>
  </main>
  <script src=""></script>
</body>
</html>
