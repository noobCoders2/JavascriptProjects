<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Todo App UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="single-screen auth-screen">
    <section class="phone auth-page">
      <header class="top-nav">
        <a class="back" href="login.html">&lt;</a>
        <h2>Sign Up</h2>
        <a href="login.html">Login</a>
      </header>

      <section class="auth-card">
        <div class="auth-heading">
          <span class="brand-mark">T</span>
          <h1>Create account</h1>
          <p>Start organizing your day with a clean task workspace.</p>
        </div>

        <form class="auth-form">
          <label>
            <span>Full name</span>
            <input type="text" placeholder="Alex Morgan">
          </label>
          <label>
            <span>Email address</span>
            <input type="email" placeholder="alex@example.com">
          </label>
          <label>
            <span>Password</span>
            <input type="password" placeholder="Create a password">
          </label>
          <label>
            <span>Confirm password</span>
            <input type="password" placeholder="Repeat your password">
          </label>
          <a class="primary-button" href="index.html">Create Account</a>
        </form>

        <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
      </section>
    </section>
  </main>
</body>
</html>
