<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stats - Todo App UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="single-screen">
    <section class="phone">
      <header class="stats-head">
        <h1>Stats</h1>
        <a href="#">This Week⌄</a>
      </header>

      <div class="big-stats">
        <article class="blue"><strong>8</strong><span>Total Tasks</span></article>
        <article class="green"><strong>5</strong><span>Completed</span></article>
        <article class="orange"><strong>3</strong><span>In Progress</span></article>
        <article class="purple"><strong>2</strong><span>To Do</span></article>
      </div>

      <section class="chart-panel">
        <h2>Productivity</h2>
        <div class="line-chart">
          <svg viewBox="0 0 320 160" aria-hidden="true">
            <path class="grid" d="M20 20H310M20 55H310M20 90H310M20 125H310"></path>
            <path class="area" d="M20 120L65 82L108 58L152 82L195 64L238 84L280 42L310 61V145H20Z"></path>
            <path class="line" d="M20 120L65 82L108 58L152 82L195 64L238 84L280 42L310 61"></path>
          </svg>
          <span class="chart-badge">75%</span>
          <div class="chart-days"><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span></div>
        </div>
      </section>

      <section class="donut-panel">
        <h2>Tasks by Category</h2>
        <div class="donut-wrap">
          <div class="donut"></div>
          <ul>
            <li><span class="blue-dot"></span>Work <em>5 (45%)</em></li>
            <li><span class="orange-dot"></span>Personal <em>3 (27%)</em></li>
            <li><span class="green-dot"></span>Travel <em>2 (18%)</em></li>
            <li><span class="gray-dot"></span>Others <em>1 (10%)</em></li>
          </ul>
        </div>
      </section>

      <nav class="tab-bar">
        <a href="index.html"><i class="nav-icon tasks"></i><span>Tasks</span></a>
        <a href="calendar.html"><i class="nav-icon calendar-icon"></i><span>Calendar</span></a>
        <a class="active" href="stats.html"><i class="nav-icon stats-icon"></i><span>Stats</span></a>
        <a href="categories.html"><i class="nav-icon settings-icon"></i><span>Settings</span></a>
      </nav>
    </section>
  </main>
</body>
</html>
