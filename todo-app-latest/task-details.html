<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Details - Todo App UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="single-screen">
    <section class="phone">
      <header class="top-nav">
        <a class="back" href="index.html">‹</a>
        <h2>Task Details</h2>
        <a href="#">•••</a>
      </header>

      <div class="detail-hero">
        <div class="check-badge">✓</div>
        <h1>Design new landing page</h1>
        <p>▣ Work</p>
      </div>

      <div class="action-row">
        <button class="orange">◷<span>Mark as<br>In Progress</span></button>
        <button class="blue">✎<span>Edit</span></button>
        <button class="green">⇧<span>Share</span></button>
        <button class="red">♢<span>Delete</span></button>
      </div>

      <section class="details-panel">
        <h2>Details</h2>
        <div class="info-line"><span>□ Due Date</span><em>Today, May 24</em></div>
        <div class="info-line"><span>◷ Time</span><em>--</em></div>
        <div class="info-line"><span>◷ Priority</span><em>Medium <small class="priority-dot"></small></em></div>
        <div class="info-line"><span>♧ Reminder</span><em>None</em></div>
      </section>

      <section class="notes-box">
        <h2>Notes</h2>
        <p>Create a modern and clean landing page for the new product launch.</p>
      </section>

      <section class="subtasks">
        <div class="subtask-head"><h2>Subtasks</h2><span>2/4</span></div>
        <div class="progress"><span></span></div>
        <p><span class="task-dot green">✓</span>Research competitors</p>
        <p><span class="task-dot gray-ring"></span>Create wireframes</p>
      </section>
    </section>
  </main>
</body>
</html>
